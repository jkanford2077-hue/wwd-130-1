<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dallin H. Oaks</title>
    <style>
        /* Insert styles here, this is called an internal stylesheet  */
        body {
            background: #FFECD7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: helvetica;
        }

        .card {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }

        .card h2 {
            font-size: 24px;
            margin: 10px 0;
        }

        .card h1 {
            font-size: 20px;
            color: #333;
            margin: 10px 0;
            word-wrap: break-word;
        }

        .card img {
            max-width: 100%;
            height: auto;
            margin: 15px 0;
        }

        ul {
            color: #fffffe;
            list-style: none;
            padding: 0;
        }

        li {
            padding: 8px 0;
            color: #333;
        }

        h4 {
            font-size: 14px;
            font-style: italic;
            margin-top: 15px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Dallin H. Oaks</h2> 
        <h1>15th President of the Church</h1>
        <a href="https://www.churchofjesuschrist.org" target="_blank">
            <img src="prophet_cards/prophet_cards/ProphetCard_wireframe.png" alt="Dallin H. Oaks">
        </a>
        <ul>
            <li>Born: August 12, 1932</li>
            <li>Apostle: April 7, 1984</li>
            <li>Prophet: October 14, 2025</li>
        </ul>
        <h4>"The only permanent solution to the differences that divide us is for all of us to follow our Savior's teachings and to gradually become even as He is."</h4>
    </div>
</body>
</html>
